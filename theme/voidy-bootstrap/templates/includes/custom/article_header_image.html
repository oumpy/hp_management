<a href="{{ SITEURL }}/{{ article.url }}" rel="bookmark"
   title="Permalink to {{ article.title|striptags|e }}">
  <img class="article-header" alt="{{ article.image-alt|default('article header image') }}" itemprop="image"
       src="{{ SITEURL }}/{{ article.image|default('favicon.ico') }}"></img>
</a>
